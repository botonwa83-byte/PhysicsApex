name: PhysicsApex
options:
  bundleIdPrefix: com.physicsapex
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "1,2"
    DEVELOPMENT_LANGUAGE: zh-Hans
schemes:
  PhysicsApex:
    build:
      targets:
        PhysicsApex: all
    run:
      config: Debug
      storeKitConfiguration: PhysicsApex.storekit
    test:
      config: Debug
      storeKitConfiguration: PhysicsApex.storekit
      targets:
        - PhysicsApexTests
targets:
  PhysicsApexTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PhysicsApexTests
    dependencies:
      - target: PhysicsApex
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
  PhysicsApex:
    type: application
    platform: iOS
    sources:
      - path: PhysicsApex
        excludes:
          - "Resources/katex/**"
      - path: PhysicsApex/Resources/katex
        type: folder
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.physicsapex.app
        PRODUCT_NAME: PhysicsApex
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: PhysicsApex
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        ENABLE_PREVIEWS: YES
